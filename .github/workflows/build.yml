name: Build SuperMario JAR

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build fat JAR
        run: ./gradlew fatJar
      - name: Copy JAR to docs for CheerpJ web play
        run: cp build/libs/SuperMario.jar docs/SuperMario.jar
      - name: Commit JAR to docs/
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/SuperMario.jar
          git diff --staged --quiet || git commit -m "Update SuperMario.jar for web play"
          git push
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperMario
          path: build/libs/SuperMario.jar
      - name: Attach JAR to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/SuperMario.jar
