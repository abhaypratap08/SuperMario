<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play SuperMario — AlgoNauts</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; }
  h1 { color: #e6b422; font-size: 1.4rem; margin-bottom: 0.5rem; letter-spacing: 2px; }
  #gameCanvas { border: 2px solid #30363d; border-radius: 4px; display: block; background: #5c94fc; }
  .info { color: #8b949e; font-size: 0.8rem; margin-top: 0.75rem; text-align: center; }
  .info span { color: #e6b422; }
  .back { margin-top: 0.75rem; color: #8b949e; font-size: 0.8rem; }
  .back a { color: #e6b422; text-decoration: none; }
  #overlay { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 800px; height: 450px; background: rgba(0,0,0,0.7); border-radius: 4px; }
  #overlay h2 { color: #e6b422; font-size: 2rem; margin-bottom: 1rem; }
  #overlay p { color: #e6edf3; margin-bottom: 0.5rem; }
  #overlay .start-btn { margin-top: 1.5rem; background: #e6b422; color: #0d1117; border: none; padding: 0.7rem 2rem; border-radius: 6px; font-size: 1rem; font-weight: 700; cursor: pointer; }
  .wrapper { position: relative; }
</style>
</head>
<body>
<h1>SUPER MARIO — ALGONAUTS</h1>
<div class="wrapper">
  <canvas id="gameCanvas" width="800" height="450"></canvas>
  <div id="overlay">
    <h2>SUPER MARIO</h2>
    <p>Arrow keys / WASD to move &nbsp;|&nbsp; Space / Up to jump</p>
    <p>Stomp enemies &nbsp;|&nbsp; Collect coins &nbsp;|&nbsp; Reach the flag!</p>
    <button class="start-btn" onclick="startGame()">PLAY NOW</button>
  </div>
</div>
<div class="info">
  <span>←→</span> Move &nbsp;&nbsp; <span>↑ / Space</span> Jump &nbsp;&nbsp; <span>Shift</span> Run
</div>
<div class="back"><a href="index.html">← Back to homepage</a> &nbsp;|&nbsp; <a href="SuperMario.jar" download>Download full game</a></div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 450;
const GRAVITY = 0.5, JUMP = -11, SPEED = 3, RUN_SPEED = 5;
const TILE = 32;

// Color palette matching your game
const C = {
  sky: '#5c94fc', ground: '#c84b0c', groundTop: '#89a925',
  brick: '#c84b0c', brickTop: '#e07038', coin: '#ffd700',
  mario: '#e52400', marioOveralls: '#0052a5', marioCap: '#e52400',
  goomba: '#a05000', goombaFeet: '#7a3a00', pipe: '#00a800',
  flag: '#ffffff', flagPole: '#888', cloud: '#ffffff',
  hill: '#89a925', hillDark: '#5a7a10', hud: '#ffffff'
};

let keys = {}, gameState = 'waiting', score = 0, coins = 0, lives = 3;
let camera = 0, frameCount = 0, won = false, gameOver = false;

// Level layout — 0=empty, 1=ground, 2=brick, 3=question, 4=pipe, 5=coin, 6=flag
const LEVEL_W = 100;
let level, entities, mario, particles;

function buildLevel() {
  level = [];
  entities = [];
  particles = [];

  // Ground
  for (let x = 0; x < LEVEL_W; x++) {
    if (x >= 20 && x <= 23) continue; // gap
    if (x >= 55 && x <= 57) continue; // gap
    level.push({x, y: 12, type: 1});
    level.push({x, y: 13, type: 1});
  }

  // Platforms
  [[4,9],[5,9],[6,9]].forEach(([x,y]) => level.push({x,y,type:2}));
  [[8,7],[9,7]].forEach(([x,y]) => level.push({x,y,type:3,hit:false,coin:true}));
  [[12,9],[13,9],[14,9],[15,9]].forEach(([x,y]) => level.push({x,y,type:2}));
  [[17,6],[18,6],[19,6]].forEach(([x,y]) => level.push({x,y,type:2}));
  [[25,9],[26,9]].forEach(([x,y]) => level.push({x,y,type:1}));
  [[28,7]].forEach(([x,y]) => level.push({x,y,type:3,hit:false,coin:false,mushroom:true}));
  [[30,9],[31,9],[32,9],[33,9]].forEach(([x,y]) => level.push({x,y,type:2}));
  [[35,6]].forEach(([x,y]) => level.push({x,y,type:3,hit:false,coin:true}));
  [[38,9],[39,9],[40,9]].forEach(([x,y]) => level.push({x,y,type:2}));
  [[42,5],[43,5],[44,5],[45,5]].forEach(([x,y]) => level.push({x,y,type:2}));
  [[48,9],[49,9],[50,9]].forEach(([x,y]) => level.push({x,y,type:1}));
  [[60,9],[61,9],[62,9],[63,9],[64,9]].forEach(([x,y]) => level.push({x,y,type:2}));
  [[67,7],[68,7],[69,7]].forEach(([x,y]) => level.push({x,y,type:2}));
  [[72,9],[73,9],[74,9]].forEach(([x,y]) => level.push({x,y,type:1}));
  [[76,6]].forEach(([x,y]) => level.push({x,y,type:3,hit:false,coin:true}));
  [[80,9],[81,9],[82,9],[83,9],[84,9],[85,9],[86,9],[87,9],[88,9],[89,9]].forEach(([x,y]) => level.push({x,y,type:1}));

  // Pipes
  [[10,11],[10,12],[11,11],[11,12]].forEach(([x,y]) => level.push({x,y,type:4}));
  [[10,10],[11,10]].forEach(([x,y]) => level.push({x,y,type:5})); // pipe top
  [[36,11],[36,12],[37,11],[37,12]].forEach(([x,y]) => level.push({x,y,type:4}));
  [[36,10],[37,10]].forEach(([x,y]) => level.push({x,y,type:5}));
  [[70,11],[70,12],[71,11],[71,12]].forEach(([x,y]) => level.push({x,y,type:4}));
  [[70,10],[71,10]].forEach(([x,y]) => level.push({x,y,type:5}));

  // Flag at end
  level.push({x:90, y:8, type:6});
  for(let y=9;y<=12;y++) level.push({x:90,y,type:7}); // pole

  // Enemies
  [7,15,26,33,42,61,68,80].forEach(x => {
    entities.push({type:'goomba',x:x*TILE,y:11*TILE,w:TILE,h:TILE,vx:-1,vy:0,alive:true,flat:false,flatTimer:0});
  });

  // Coins floating
  [[5,8],[6,8],[13,8],[14,8],[31,8],[32,8],[62,8],[63,8]].forEach(([x,y]) => {
    entities.push({type:'coin',x:x*TILE+8,y:y*TILE,w:16,h:16,collected:false,bobOffset:Math.random()*Math.PI*2});
  });

  mario = {
    x: 2*TILE, y: 10*TILE, w: 24, h: 32,
    vx: 0, vy: 0, onGround: false,
    facingRight: true, running: false,
    animFrame: 0, animTimer: 0,
    super: false, invincible: 0, dead: false, deadTimer: 0
  };

  camera = 0;
  won = false;
  gameOver = false;
}

function getTile(x, y) {
  return level.find(t => t.x === x && t.y === y);
}

function solidTile(t) {
  return t && [1,2,3,4,5,6,7].includes(t.type) && t.type !== 6;
}

function update() {
  if (gameState !== 'playing') return;
  frameCount++;

  if (mario.dead) {
    mario.deadTimer++;
    mario.vy += 0.4;
    mario.y += mario.vy;
    if (mario.deadTimer > 120) {
      lives--;
      if (lives <= 0) { gameState = 'gameover'; return; }
      buildLevel();
    }
    return;
  }

  if (mario.invincible > 0) mario.invincible--;

  // Input
  const left = keys['ArrowLeft'] || keys['a'] || keys['A'];
  const right = keys['ArrowRight'] || keys['d'] || keys['D'];
  const jump = keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' '];
  const run = keys['Shift'];

  const spd = run ? RUN_SPEED : SPEED;

  if (left)  { mario.vx = -spd; mario.facingRight = false; }
  else if (right) { mario.vx = spd; mario.facingRight = true; }
  else mario.vx *= 0.8;

  if (jump && mario.onGround) {
    mario.vy = JUMP;
    mario.onGround = false;
    spawnParticle(mario.x + mario.w/2, mario.y + mario.h, '#fff', 4);
  }

  mario.vy += GRAVITY;
  mario.vy = Math.min(mario.vy, 12);

  // Move X
  mario.x += mario.vx;
  if (mario.x < 0) mario.x = 0;

  // Collide X
  const mCol = marioTiles();
  mCol.forEach(([tx,ty]) => {
    const t = getTile(tx,ty);
    if (!solidTile(t)) return;
    const tpx = tx*TILE, tpy = ty*TILE;
    if (mario.vx > 0 && mario.x+mario.w > tpx && mario.x < tpx) mario.x = tpx - mario.w;
    if (mario.vx < 0 && mario.x < tpx+TILE && mario.x+mario.w > tpx+TILE) mario.x = tpx+TILE;
  });

  // Move Y
  mario.onGround = false;
  mario.y += mario.vy;

  // Collide Y
  marioTiles().forEach(([tx,ty]) => {
    const t = getTile(tx,ty);
    if (!solidTile(t)) return;
    const tpx = tx*TILE, tpy = ty*TILE;
    if (mario.vy > 0 && mario.y+mario.h > tpy && mario.y < tpy) {
      mario.y = tpy - mario.h;
      mario.vy = 0;
      mario.onGround = true;
    }
    if (mario.vy < 0 && mario.y < tpy+TILE && mario.y+mario.h > tpy+TILE) {
      mario.y = tpy+TILE;
      mario.vy = 1;
      // Hit block from below
      hitBlock(t, tx, ty);
    }
  });

  // Death by falling
  if (mario.y > H + 200) killMario();

  // Win
  if (mario.x > 90*TILE - 16) { gameState = 'won'; return; }

  // Camera
  camera = Math.max(0, Math.min(mario.x - W/3, (LEVEL_W-25)*TILE));

  // Animation
  mario.animTimer++;
  if (mario.onGround && Math.abs(mario.vx) > 0.5) {
    if (mario.animTimer % 8 === 0) mario.animFrame = (mario.animFrame+1)%4;
  } else mario.animFrame = mario.onGround ? 0 : 2;

  // Update entities
  entities.forEach(e => {
    if (e.type === 'goomba' && e.alive) {
      if (e.flat) { e.flatTimer--; if (e.flatTimer <= 0) { e.alive = false; } return; }
      e.vy += GRAVITY;
      e.x += e.vx;
      e.y += e.vy;

      // Tile collision
      const gTilesX = [[Math.floor(e.x/TILE), Math.floor((e.y+e.h/2)/TILE)],[Math.floor((e.x+e.w)/TILE), Math.floor((e.y+e.h/2)/TILE)]];
      gTilesX.forEach(([tx,ty]) => {
        const t = getTile(tx,ty);
        if (solidTile(t)) e.vx *= -1;
      });

      const gTilesY = [[Math.floor((e.x+4)/TILE), Math.floor((e.y+e.h)/TILE)],[Math.floor((e.x+e.w-4)/TILE), Math.floor((e.y+e.h)/TILE)]];
      gTilesY.forEach(([tx,ty]) => {
        const t = getTile(tx,ty);
        if (solidTile(t) && e.vy > 0) { e.y = ty*TILE-e.h; e.vy = 0; }
      });

      if (e.x < camera - TILE*2) e.vx = Math.abs(e.vx);

      // Mario collision
      if (mario.invincible === 0 && rectsOverlap(mario, e)) {
        if (mario.vy > 0 && mario.y+mario.h < e.y+e.h*0.6) {
          e.flat = true; e.flatTimer = 40;
          mario.vy = -7;
          score += 100;
          spawnParticle(e.x+e.w/2, e.y, '#ffd700', 6);
          spawnText(e.x+e.w/2, e.y, '100');
        } else {
          killMario();
        }
      }
    }

    if (e.type === 'coin' && !e.collected) {
      e.bobOffset += 0.05;
      if (rectsOverlap(mario, {x:e.x,y:e.y+Math.sin(e.bobOffset)*4,w:e.w,h:e.h})) {
        e.collected = true;
        coins++;
        score += 50;
        spawnParticle(e.x+e.w/2, e.y, '#ffd700', 8);
        spawnText(e.x+e.w/2, e.y, '+50');
      }
    }

    if (e.type === 'mushroom' && e.active) {
      e.x += e.vx;
      e.vy += GRAVITY;
      e.y += e.vy;
      const mTiles = [[Math.floor(e.x/TILE),Math.floor((e.y+e.h)/TILE)],[Math.floor((e.x+e.w)/TILE),Math.floor((e.y+e.h)/TILE)]];
      mTiles.forEach(([tx,ty]) => {
        const t = getTile(tx,ty);
        if (solidTile(t) && e.vy > 0) { e.y = ty*TILE-e.h; e.vy=0; }
      });
      if (rectsOverlap(mario, e)) {
        e.active = false; mario.super = true;
        mario.h = 40; mario.y -= 8;
        score += 1000;
        spawnText(mario.x, mario.y-20, 'SUPER!');
      }
    }
  });

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.2;
    p.life--;
  });
}

function hitBlock(t, tx, ty) {
  if (t.type === 3 && !t.hit) {
    t.hit = true;
    if (t.coin) { score += 200; coins++; spawnText(tx*TILE+TILE/2, ty*TILE-10, '200'); spawnParticle(tx*TILE+TILE/2, ty*TILE, '#ffd700', 8); }
    if (t.mushroom) { entities.push({type:'mushroom',x:tx*TILE,y:(ty-1)*TILE,w:24,h:24,vx:2,vy:-3,active:true}); }
  }
  if (t.type === 2) {
    spawnParticle(tx*TILE+TILE/2, ty*TILE+TILE/2, '#c84b0c', 6);
  }
}

function marioTiles() {
  const tiles = [];
  const xs = [mario.x, mario.x+mario.w-1];
  const ys = [mario.y, mario.y+mario.h-1];
  xs.forEach(x => ys.forEach(y => {
    const tx = Math.floor(x/TILE), ty = Math.floor(y/TILE);
    if (!tiles.find(t => t[0]===tx&&t[1]===ty)) tiles.push([tx,ty]);
  }));
  return tiles;
}

function rectsOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function killMario() {
  if (mario.invincible > 0 || mario.dead) return;
  if (mario.super) { mario.super=false; mario.h=32; mario.invincible=120; return; }
  mario.dead = true; mario.vy = -12; mario.deadTimer = 0;
}

function spawnParticle(x, y, color, count) {
  for (let i=0;i<count;i++) {
    particles.push({x,y,vx:(Math.random()-0.5)*4,vy:Math.random()*-4-1,color,life:30+Math.random()*20,size:3+Math.random()*3});
  }
}

const floatTexts = [];
function spawnText(x, y, text) {
  floatTexts.push({x,y,text,life:60,vy:-1});
}

function drawMario() {
  const mx = mario.x - camera, my = mario.y;
  const flip = !mario.facingRight;
  ctx.save();
  if (flip) { ctx.scale(-1,1); ctx.translate(-mx*2-mario.w, 0); }
  if (mario.invincible > 0 && Math.floor(frameCount/4)%2===0) { ctx.restore(); return; }

  const blink = mario.dead;
  if (!blink) {
    // Cap
    ctx.fillStyle = C.marioCap;
    ctx.fillRect(mx+2, my, mario.w-4, 8);
    ctx.fillRect(mx, my+4, mario.w, 4);
    // Face
    ctx.fillStyle = '#ffb879';
    ctx.fillRect(mx+2, my+8, mario.w-4, 10);
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(mx+mario.w-9, my+10, 3, 3);
    // Overalls
    ctx.fillStyle = C.marioOveralls;
    ctx.fillRect(mx+2, my+18, mario.w-4, mario.h-18);
    // Shoes
    ctx.fillStyle = '#5c3000';
    ctx.fillRect(mx, my+mario.h-6, mario.w, 6);
    // Buttons
    ctx.fillStyle = C.marioCap;
    ctx.fillRect(mx+4, my+20, 4, 4);
    ctx.fillRect(mx+mario.w-8, my+20, 4, 4);
  }
  ctx.restore();
}

function drawGoomba(e) {
  const ex = e.x - camera;
  if (ex < -TILE || ex > W+TILE) return;
  ctx.fillStyle = C.goomba;
  if (e.flat) {
    ctx.fillRect(ex, e.y+e.h-12, e.w, 12);
    ctx.fillStyle = C.goombaFeet;
    ctx.fillRect(ex, e.y+e.h-6, e.w/2-2, 6);
    ctx.fillRect(ex+e.w/2+2, e.y+e.h-6, e.w/2-2, 6);
    return;
  }
  // Body
  ctx.fillRect(ex+2, e.y+4, e.w-4, e.h-10);
  // Head
  ctx.fillStyle = '#c87840';
  ctx.fillRect(ex, e.y, e.w, 20);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(ex+4, e.y+4, 8, 8);
  ctx.fillRect(ex+e.w-12, e.y+4, 8, 8);
  ctx.fillStyle = '#000';
  ctx.fillRect(ex+5, e.y+6, 4, 4);
  ctx.fillRect(ex+e.w-10, e.y+6, 4, 4);
  // Feet
  ctx.fillStyle = C.goombaFeet;
  const walk = Math.floor(frameCount/8)%2;
  ctx.fillRect(ex+(walk?2:0), e.y+e.h-8, 10, 8);
  ctx.fillRect(ex+e.w-12+(walk?0:2), e.y+e.h-8, 10, 8);
}

function drawTile(t) {
  const px = t.x*TILE - camera, py = t.y*TILE;
  if (px < -TILE || px > W+TILE) return;

  if (t.type === 1) {
    ctx.fillStyle = C.ground;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = C.groundTop;
    ctx.fillRect(px, py, TILE, 6);
    ctx.fillStyle = '#7a3500';
    ctx.fillRect(px+1, py+7, TILE-2, 1);
  } else if (t.type === 2) {
    ctx.fillStyle = C.brick;
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = C.brickTop;
    ctx.fillRect(px+1, py+1, TILE-2, 6);
    ctx.fillRect(px+1, py+TILE/2+1, TILE-2, 6);
    ctx.fillStyle = '#7a3500';
    ctx.fillRect(px, py+TILE/2, TILE, 2);
    ctx.fillRect(px+TILE/2, py, 2, TILE/2);
    ctx.fillRect(px+TILE/4, py+TILE/2, 2, TILE/2);
  } else if (t.type === 3) {
    if (t.hit) {
      ctx.fillStyle = '#888'; ctx.fillRect(px, py, TILE, TILE);
    } else {
      ctx.fillStyle = '#e0a000';
      ctx.fillRect(px, py, TILE, TILE);
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(px+2, py+2, TILE-4, 8);
      ctx.fillStyle = '#c07800';
      ctx.font = 'bold 18px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('?', px+TILE/2, py+TILE-6);
    }
  } else if (t.type === 4) {
    ctx.fillStyle = '#008000';
    ctx.fillRect(px, py, TILE, TILE);
    ctx.fillStyle = '#00c000';
    ctx.fillRect(px+2, py+2, 6, TILE-4);
  } else if (t.type === 5) {
    // Pipe top
    ctx.fillStyle = '#00a800';
    ctx.fillRect(px-4, py, TILE+8, TILE);
    ctx.fillStyle = '#00d000';
    ctx.fillRect(px-2, py+2, TILE+4, 10);
  } else if (t.type === 6) {
    // Flag
    ctx.fillStyle = C.flagPole;
    ctx.fillRect(px+TILE/2-1, py, 2, TILE);
    ctx.fillStyle = '#e52400';
    ctx.beginPath();
    ctx.moveTo(px+TILE/2+1, py+2);
    ctx.lineTo(px+TILE/2+14, py+8);
    ctx.lineTo(px+TILE/2+1, py+14);
    ctx.fill();
  } else if (t.type === 7) {
    ctx.fillStyle = C.flagPole;
    ctx.fillRect(px+TILE/2-1, py, 2, TILE);
  }
}

function drawBackground() {
  // Sky
  ctx.fillStyle = C.sky;
  ctx.fillRect(0, 0, W, H);

  // Clouds
  [[1,1],[8,2],[15,1],[25,2],[35,1],[45,2],[55,1],[65,2],[75,1],[85,2]].forEach(([cx,cy]) => {
    const x = cx*TILE - camera*0.3;
    if (x < -80 || x > W+80) return;
    drawCloud(x, cy*TILE);
  });

  // Hills
  [[5,12],[20,12],[40,12],[60,12],[78,12]].forEach(([hx,hy]) => {
    const x = hx*TILE - camera*0.6;
    if (x < -100 || x > W+100) return;
    ctx.fillStyle = C.hill;
    ctx.beginPath();
    ctx.arc(x, hy*TILE, 50, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = C.hillDark;
    ctx.beginPath();
    ctx.arc(x-15, hy*TILE, 25, Math.PI, 0);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x+20, hy*TILE, 20, Math.PI, 0);
    ctx.fill();
  });
}

function drawCloud(x, y) {
  ctx.fillStyle = C.cloud;
  ctx.beginPath();
  ctx.arc(x, y, 20, 0, Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.arc(x+22, y+4, 16, 0, Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.arc(x-18, y+6, 14, 0, Math.PI*2); ctx.fill();
  ctx.fillRect(x-32, y+6, 72, 14);
}

function drawHUD() {
  ctx.fillStyle = C.hud;
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`SCORE: ${score}`, 10, 24);
  ctx.fillText(`COINS: ${coins}`, 200, 24);
  ctx.fillText(`LIVES: ${lives}`, 380, 24);
  ctx.fillText(`WORLD: 1-1`, 560, 24);
}

function draw() {
  ctx.clearRect(0,0,W,H);
  drawBackground();
  level.forEach(t => drawTile(t));

  entities.forEach(e => {
    if (e.type === 'goomba') drawGoomba(e);
    if (e.type === 'coin' && !e.collected) {
      const ex = e.x - camera;
      ctx.fillStyle = C.coin;
      ctx.beginPath();
      ctx.arc(ex+e.w/2, e.y+e.h/2+Math.sin(e.bobOffset)*4, 8, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ffa000';
      ctx.beginPath();
      ctx.arc(ex+e.w/2-2, e.y+e.h/2+Math.sin(e.bobOffset)*4-2, 4, 0, Math.PI*2);
      ctx.fill();
    }
    if (e.type === 'mushroom' && e.active) {
      const ex = e.x - camera;
      ctx.fillStyle = '#e52400';
      ctx.beginPath();
      ctx.arc(ex+e.w/2, e.y+e.h/2, e.w/2, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.fillRect(ex+2, e.y+e.h/2, e.w-4, e.h/2);
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(ex+6, e.y+8, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath();
      ctx.arc(ex+e.w-6, e.y+8, 4, 0, Math.PI*2); ctx.fill();
    }
  });

  drawMario();

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life/50;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-camera, p.y, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  // Float texts
  for (let i = floatTexts.length-1; i>=0; i--) {
    const ft = floatTexts[i];
    ft.y += ft.vy; ft.life--;
    if (ft.life <= 0) { floatTexts.splice(i,1); continue; }
    ctx.globalAlpha = ft.life/60;
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x-camera, ft.y);
  }
  ctx.globalAlpha = 1;

  drawHUD();

  // Game state overlays
  if (gameState === 'won') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#e6b422';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('YOU WIN!', W/2, H/2-30);
    ctx.fillStyle = '#fff';
    ctx.font = '24px monospace';
    ctx.fillText(`Score: ${score}`, W/2, H/2+20);
    ctx.font = '18px monospace';
    ctx.fillText('Press Enter to play again', W/2, H/2+60);
  }

  if (gameState === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#e52400';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W/2, H/2-20);
    ctx.fillStyle = '#fff';
    ctx.font = '18px monospace';
    ctx.fillText('Press Enter to try again', W/2, H/2+30);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  gameState = 'playing';
  score = 0; coins = 0; lives = 3;
  buildLevel();
}

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((gameState === 'won' || gameState === 'gameover') && e.key === 'Enter') {
    score = 0; coins = 0; lives = 3;
    buildLevel();
    gameState = 'playing';
  }
  if (gameState === 'playing') e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Mobile controls
const mc = [['←','ArrowLeft'],['→','ArrowRight'],['↑ Jump',' ']];
const mDiv = document.createElement('div');
mDiv.style = 'display:flex;gap:8px;margin-top:10px;';
mc.forEach(([label, key]) => {
  const btn = document.createElement('button');
  btn.textContent = label;
  btn.style = 'background:#21262d;color:#e6b422;border:1px solid #30363d;border-radius:6px;padding:10px 20px;font-size:1rem;cursor:pointer;user-select:none;';
  btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key]=true; });
  btn.addEventListener('touchend', e => { e.preventDefault(); keys[key]=false; });
  btn.addEventListener('mousedown', () => keys[key]=true);
  btn.addEventListener('mouseup', () => keys[key]=false);
  mDiv.appendChild(btn);
});
document.querySelector('.wrapper').after(mDiv);

buildLevel();
loop();
</script>
</body>
</html>
