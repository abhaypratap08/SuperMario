<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Play SuperMario — AlgoNauts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 2rem; }
    h1 { color: #e6b422; font-size: 2rem; margin-bottom: 0.5rem; }
    p.sub { color: #8b949e; margin-bottom: 1rem; font-size: 0.95rem; }
    #display { width: 860px; max-width: 100%; height: 560px; border: 2px solid #30363d; border-radius: 8px; background: #000; }
    #progress { width: 300px; height: 4px; background: #30363d; border-radius: 2px; margin: 0.75rem auto; }
    #bar { height: 4px; background: #e6b422; border-radius: 2px; width: 0%; transition: width 0.5s; }
    #status { color: #8b949e; font-size: 0.85rem; text-align: center; margin-bottom: 0.5rem; }
    .back { margin-top: 1rem; color: #8b949e; font-size: 0.85rem; }
    .back a { color: #e6b422; text-decoration: none; }
  </style>
</head>
<body>
  <h1>SuperMario</h1>
  <p class="sub">Running your actual Java game in the browser via CheerpJ</p>
  <p id="status">Loading Java runtime... (first load ~30–60s)</p>
  <div id="progress"><div id="bar"></div></div>
  <div id="display"></div>
  <p class="back">
    <a href="index.html">← Back</a> &nbsp;|&nbsp;
    <a href="SuperMario.jar" download>Download JAR instead</a>
  </p>

  <script src="https://cjrtnc.leaningtech.com/3.0/cj3loader.js"></script>
  <script>
    (async () => {
      const bar = document.getElementById('bar');
      const status = document.getElementById('status');
      try {
        bar.style.width = '10%';
        await cheerpjInit({
          version: 17,
          status: 'none',
        });
        bar.style.width = '50%';
        status.textContent = 'Starting game...';
        cheerpjCreateDisplay(860, 560, document.getElementById('display'));
        bar.style.width = '80%';
        await cheerpjRunJar('/app/SuperMario.jar');
        bar.style.width = '100%';
        status.textContent = '';
        document.getElementById('progress').style.display = 'none';
      } catch(e) {
        console.error(e);
        status.textContent = 'Failed to load. Try downloading the JAR below.';
        document.getElementById('progress').style.display = 'none';
      }
    })();
  </script>
</body>
</html>
