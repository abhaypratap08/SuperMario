<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Play SuperMario — AlgoNauts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 2rem; }
    h1 { color: #e6b422; font-size: 2rem; margin-bottom: 0.5rem; }
    p.sub { color: #8b949e; margin-bottom: 1.5rem; font-size: 0.95rem; }
    #cheerpj-display { width: 860px; max-width: 100%; height: 600px; border: 2px solid #30363d; border-radius: 8px; background: #000; }
    .loading { color: #8b949e; font-size: 0.9rem; margin-top: 1rem; }
    .back { margin-top: 1.5rem; color: #8b949e; font-size: 0.9rem; }
    .back a { color: #e6b422; text-decoration: none; }
  </style>
  <script src="https://cjrtnc.leaningtech.com/3.0/cj3loader.js"></script>
</head>
<body>
  <h1>SuperMario</h1>
  <p class="sub">Running via CheerpJ — Java in your browser</p>
  <div id="cheerpj-display"></div>
  <p class="loading" id="status">Loading Java runtime...</p>
  <p class="back"><a href="index.html">← Back to homepage</a> &nbsp;|&nbsp; <a href="https://github.com/abhaypratap08/SuperMario/releases/latest/download/SuperMario.jar">Download JAR</a></p>
  <script>
    async function main() {
      await cheerpjInit({ version: 17 });
      document.getElementById('status').textContent = 'Starting game...';
      cheerpjCreateDisplay(860, 600, document.getElementById('cheerpj-display'));
      await cheerpjRunJar('/app/SuperMario.jar');
      document.getElementById('status').textContent = '';
    }
    main().catch(e => {
      document.getElementById('status').textContent = 'Could not load — try downloading the JAR instead.';
    });
  </script>
</body>
</html>
